<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD – Gallery</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <link rel="stylesheet" href="/src/css/responsive.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">GUYGD</a>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Gallery</h1>
    <p>Moments captured from our events, programs, and community activities.</p>
  </div>

  <section class="section">
    <div class="container">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:30px;" id="category-tabs">
        <button class="btn btn-primary btn-sm" onclick="filterGallery('All', this)">All</button>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <p>Loading gallery...</p>
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:3000;align-items:center;justify-content:center;flex-direction:column;">
    <button onclick="closeLightbox()" style="position:absolute;top:20px;right:25px;background:none;border:none;color:#fff;font-size:2rem;cursor:pointer;">✕</button>
    <img id="lightbox-img" src="" alt="" style="max-width:90%;max-height:80vh;border-radius:8px;"/>
    <p id="lightbox-caption" style="color:#fff;margin-top:15px;font-size:0.95rem;text-align:center;"></p>
  </div>

  <footer id="footer"></footer>
  <script src="/src/js/main.js"></script>
  <script>
    let allImages = [];

    function openLightbox(src, caption) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-caption').textContent = caption || '';
      lb.style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }

    function renderGallery(list) {
      const g = document.getElementById('gallery-grid');
      if (!list.length) { g.innerHTML = '<p>No images found.</p>'; return; }
      g.innerHTML = list.map(img => `
        <div class="gallery-item" onclick="openLightbox('${img.image_url}', '${img.caption || img.title || ''}')">
          <img src="${img.image_url}" alt="${img.title || 'Gallery image'}" loading="lazy"/>
          <div class="gallery-overlay">${img.caption || img.title || ''}</div>
        </div>`).join('');
    }

    function filterGallery(cat, btn) {
      document.querySelectorAll('#category-tabs .btn').forEach(b => b.className = 'btn btn-green btn-sm');
      btn.className = 'btn btn-primary btn-sm';
      renderGallery(cat === 'All' ? allImages : allImages.filter(i => i.category === cat));
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        allImages = await apiFetch('/gallery');
        renderGallery(allImages);
        const cats = [...new Set(allImages.map(i => i.category).filter(Boolean))];
        const tabs = document.getElementById('category-tabs');
        cats.forEach(c => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-green btn-sm';
          btn.textContent = c;
          btn.onclick = () => filterGallery(c, btn);
          tabs.appendChild(btn);
        });
      } catch {
        document.getElementById('gallery-grid').innerHTML = '<p>No gallery images yet.</p>';
      }
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
</body>
</html>
