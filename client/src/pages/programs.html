<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD – Programs</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <link rel="stylesheet" href="/src/css/responsive.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">GUYGD</a>
      <button class="hamburger" aria-label="Menu"></button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Our Programs</h1>
    <p>Initiatives designed to empower, educate, and uplift our community.</p>
  </div>

  <section class="section">
    <div class="container" id="programs-container">
      <div style="text-align:center;padding:40px;color:#6b7280;">Loading programs...</div>
    </div>
  </section>

  <section class="section bg-light">
    <div class="container cta-box">
      <h2>Get Involved</h2>
      <p>Join us as a member, volunteer, or donor and help us expand these programs.</p>
      <div class="hero-btns">
        <a href="/membership.html" class="btn btn-primary">Become a Member</a>
        <a href="/donate.html" class="btn btn-green">Support a Program</a>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <script src="/src/js/main.js"></script>
  <script>
    const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';

    const STATIC_PROGRAMS = [
      { icon: '🛠️', title: 'Skills Development', description: 'We run vocational and skills training workshops to equip youths with practical abilities that translate into employment and entrepreneurship opportunities.', bullets: 'Computer literacy and digital skills\nEntrepreneurship and business training\nAgricultural and trade skills workshops', image_url: null },
      { icon: '🌍', title: 'Community Service', description: 'Our members regularly engage in community service activities that improve the quality of life in Gbeh-lay and surrounding areas.', bullets: 'Community clean-up campaigns\nTree planting and environmental awareness\nHealth and sanitation drives', image_url: null },
      { icon: '🏆', title: 'Leadership Development', description: 'We invest in developing the next generation of leaders through structured training, mentorship, and opportunities to lead real projects.', bullets: 'Youth leadership summits\nPublic speaking and debate training\nMentorship with community elders and professionals', image_url: null },
      { icon: '⚽', title: 'Sports & Recreation', description: 'We organize sports tournaments and recreational activities to promote teamwork, discipline, and healthy living among youths.', bullets: 'Annual football tournament\nIndoor games and cultural activities\nYouth talent showcases', image_url: null },
    ];

    function renderPrograms(list) {
      const c = document.getElementById('programs-container');
      if (!list.length) { c.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;">No programs yet.</div>'; return; }
      c.innerHTML = list.map((p, i) => `
        <div class="program-block ${i % 2 !== 0 ? 'reverse' : ''}">
          ${p.image_url
            ? `<div class="program-img"><img src="${p.image_url}" alt="${p.title}" style="width:100%;max-width:340px;border-radius:14px;object-fit:cover;aspect-ratio:4/3;"/></div>`
            : `<div class="program-icon">${p.icon || '📌'}</div>`}
          <div class="program-info">
            <h2>${p.icon ? p.icon + ' ' : ''}${p.title}</h2>
            <p>${p.description}</p>
            ${p.bullets ? `<ul>${p.bullets.split('\n').map(b => `<li>${b.trim()}</li>`).join('')}</ul>` : ''}
          </div>
        </div>`).join('');
    }

    async function loadPrograms() {
      try {
        const res = await fetch(`${API}/programs`);
        const data = await res.json();
        renderPrograms(data.length ? data : STATIC_PROGRAMS);
      } catch {
        renderPrograms(STATIC_PROGRAMS);
      }
    }

    loadPrograms();
  </script>
</body>
</html>
