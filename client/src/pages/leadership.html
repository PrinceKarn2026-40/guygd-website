<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD – Leadership</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <link rel="stylesheet" href="/src/css/responsive.css"/>
  <style>
    .page-hero {
      background: linear-gradient(135deg, #1a1f36 0%, #2d6a4f 100%);
      color: #fff; text-align: center; padding: 80px 20px 60px;
    }
    .page-hero h1 { font-size: 2.4rem; margin: 0 0 12px; }
    .page-hero p  { font-size: 1.05rem; opacity: 0.85; margin: 0; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 28px; padding: 0;
    }
    .team-card {
      background: #fff; border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      overflow: hidden; text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .team-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.13); }
    .team-card-photo {
      width: 100%; height: 220px; object-fit: cover;
      background: #e8f5e9; display: block;
    }
    .team-card-photo-placeholder {
      width: 100%; height: 220px; background: linear-gradient(135deg, #2d6a4f22, #1a1f3622);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: #2d6a4f;
    }
    .team-card-body { padding: 18px 16px 22px; }
    .team-card-body h3 { margin: 0 0 6px; font-size: 1.05rem; color: #1a1f36; }
    .team-card-body .position {
      display: inline-block; background: #e8f5e9; color: #2d6a4f;
      font-size: 0.78rem; font-weight: 600; padding: 3px 12px;
      border-radius: 20px; margin-bottom: 10px;
    }
    .team-card-body .bio { font-size: 0.85rem; color: #6c757d; line-height: 1.5; margin: 0; }

    .empty-team { text-align: center; padding: 60px 20px; color: #8b9bb4; }
    .empty-team .icon { font-size: 3.5rem; margin-bottom: 14px; }
    .empty-team p { font-size: 0.95rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">GUYGD</a>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Our Leadership</h1>
    <p>Meet the dedicated leaders driving GUYGD's mission forward.</p>
  </div>

  <section class="section">
    <div class="container">
      <h2 class="section-title">Executive Leadership Team</h2>
      <div class="team-grid" id="team-grid">
        <div class="empty-team" style="grid-column:1/-1;">
          <div class="icon">⏳</div><p>Loading team members...</p>
        </div>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <script src="/src/js/main.js"></script>
  <script>
    async function loadTeam() {
      const grid = document.getElementById('team-grid');
      try {
        const res = await fetch(`${API}/team`);
        const list = await res.json();
        if (!list.length) {
          grid.innerHTML = `<div class="empty-team" style="grid-column:1/-1;">
            <div class="icon">👥</div><p>Leadership profiles coming soon.</p></div>`;
          return;
        }
        grid.innerHTML = list.map(m => `
          <div class="team-card">
            ${m.photo
              ? `<img class="team-card-photo" src="${m.photo}" alt="${m.name}" onerror="this.parentNode.querySelector('.team-card-photo-placeholder').style.display='flex';this.style.display='none'"/><div class="team-card-photo-placeholder" style="display:none;">👤</div>`
              : `<div class="team-card-photo-placeholder">👤</div>`}
            <div class="team-card-body">
              <h3>${m.name}</h3>
              <span class="position">${m.position}</span>
              ${m.bio ? `<p class="bio">${m.bio}</p>` : ''}
            </div>
          </div>`).join('');
      } catch(e) {
        grid.innerHTML = `<div class="empty-team" style="grid-column:1/-1;">
          <div class="icon">⚠️</div><p>Unable to load team members.</p></div>`;
      }
    }
    document.addEventListener('DOMContentLoaded', loadTeam);
  </script>
</body>
</html>
