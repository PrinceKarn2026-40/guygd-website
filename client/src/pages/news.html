<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD – News</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <link rel="stylesheet" href="/src/css/responsive.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">GUYGD</a>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-hero">
    <h1>News &amp; Updates</h1>
    <p>Stay informed about GUYGD's latest activities and announcements.</p>
  </div>

  <section class="section">
    <div class="container">
      <div style="display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap;">
        <input type="text" id="search" placeholder="Search news..." style="flex:1;padding:10px 15px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.95rem;"/>
        <select id="category-filter" style="padding:10px 15px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.95rem;">
          <option value="">All Categories</option>
          <option value="announcement">Announcements</option>
          <option value="event">Events</option>
          <option value="scholarship">Scholarships</option>
          <option value="community">Community</option>
        </select>
      </div>
      <div class="cards-grid" id="news-list"><p>Loading news...</p></div>
      <div style="text-align:center;margin-top:2rem;">
        <button id="load-more" class="btn btn-green" style="display:none;">Load More</button>
      </div>
    </div>
  </section>

  <!-- News Detail Modal -->
  <div id="news-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;overflow-y:auto;padding:40px 5%;">
    <div style="max-width:700px;margin:0 auto;background:#fff;border-radius:10px;padding:40px;position:relative;">
      <button onclick="document.getElementById('news-modal').style.display='none'" style="position:absolute;top:15px;right:20px;background:none;border:none;font-size:1.5rem;cursor:pointer;">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <footer id="footer"></footer>
  <script src="/src/js/main.js"></script>
  <script>
    let allNews = [];
    let page = 1;

    async function loadNews() {
      try {
        const data = await apiFetch('/news');
        allNews = data;
        renderNews(allNews);
      } catch { document.getElementById('news-list').innerHTML = '<p>Could not load news.</p>'; }
    }

    function renderNews(list) {
      const c = document.getElementById('news-list');
      if (!list.length) { c.innerHTML = '<p>No news found.</p>'; return; }
      c.innerHTML = list.map(n => `
        <div class="card" style="cursor:pointer;" onclick="openNews(${n.id})">
          ${n.image ? `<img src="${n.image}" alt="${n.title}" style="width:100%;height:180px;object-fit:cover;border-radius:10px 10px 0 0;margin:-25px -25px 20px;width:calc(100% + 50px);"/>` : '<div class="card-icon">📰</div>'}
          <h3>${n.title}</h3>
          <p class="card-meta">${new Date(n.created_at).toLocaleDateString()} ${n.category ? `· <span class="badge">${n.category}</span>` : ''}</p>
          <p>${(n.summary || n.content.substring(0, 100))}...</p>
        </div>`).join('');
    }

    function openNews(id) {
      const n = allNews.find(x => x.id === id);
      if (!n) return;
      document.getElementById('modal-content').innerHTML = `
        ${n.image ? `<img src="${n.image}" alt="${n.title}" style="width:100%;border-radius:8px;margin-bottom:20px;"/>` : ''}
        <h2 style="margin-bottom:10px;">${n.title}</h2>
        <p style="color:#6c757d;font-size:0.85rem;margin-bottom:20px;">${new Date(n.created_at).toLocaleDateString()}</p>
        <div style="line-height:1.8;color:#333;">${n.content}</div>`;
      document.getElementById('news-modal').style.display = 'block';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadNews();
      document.getElementById('search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        renderNews(allNews.filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)));
      });
      document.getElementById('category-filter').addEventListener('change', (e) => {
        const cat = e.target.value;
        renderNews(cat ? allNews.filter(n => n.category === cat) : allNews);
      });
    });
  </script>
</body>
</html>
