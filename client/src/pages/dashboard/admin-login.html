<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD — Admin Login</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d2b18;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0a1f0f 0%, #1a3a22 60%, #0d2b18 100%);
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .top {
      text-align: center;
      margin-bottom: 32px;
    }
    .shield {
      display: inline-block;
      width: 60px; height: 60px;
      background: #1a6b3c;
      border-radius: 14px;
      font-size: 1.7rem;
      line-height: 60px;
      margin-bottom: 12px;
    }
    .top h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: #111827;
      margin: 0 0 4px;
    }
    .top p {
      font-size: 0.84rem;
      color: #6b7280;
      margin: 0;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    .field input {
      display: block;
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #d1d5db;
      border-radius: 9px;
      font-size: 0.92rem;
      color: #111827;
      background: #fff;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #1a6b3c; box-shadow: 0 0 0 3px rgba(26,107,60,0.1); }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #1a6b3c;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #155c32; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 10px 13px;
      border-radius: 8px;
      font-size: 0.84rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .alert.error   { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .hr { height: 1px; background: #e5e7eb; margin: 22px 0; }
    .note { text-align: center; font-size: 0.78rem; color: #9ca3af; }
    .back { text-align: center; margin-top: 18px; font-size: 0.82rem; color: #6b7280; }
    .back a { color: #1a6b3c; font-weight: 600; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="shield">🛡️</div>
      <h1>GUYGD Admin</h1>
      <p>Sign in to access the admin panel</p>
    </div>

    <div class="alert" id="alert"></div>

    <form id="form">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@guygd.org" required autofocus/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn" id="btn">🔐 Sign In to Admin Panel</button>
    </form>

    <div class="hr"></div>
    <div class="note">🔒 Restricted access — authorized personnel only</div>
    <div class="back"><a href="/index.html">← Back to main site</a></div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';

    // Redirect if already logged in as admin
    try {
      const u = JSON.parse(localStorage.getItem('guygd_user') || 'null');
      const t = localStorage.getItem('guygd_token');
      if (u && t && ['admin','executive','super_admin'].includes(u.role)) {
        window.location.href = '/dashboard/admin.html';
      }
    } catch(e) {}

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const alertEl = document.getElementById('alert');
      alertEl.className = 'alert';
      btn.disabled = true;
      btn.textContent = '⏳ Signing in...';

      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        if (!['admin','executive','super_admin'].includes(data.user.role)) {
          throw new Error('Access denied. Admin accounts only.');
        }
        localStorage.setItem('guygd_token', data.token);
        localStorage.setItem('guygd_user', JSON.stringify(data.user));
        alertEl.textContent = '✅ Login successful! Redirecting...';
        alertEl.className = 'alert success';
        setTimeout(() => { window.location.href = '/dashboard/admin.html'; }, 1000);
      } catch(err) {
        alertEl.textContent = err.message || 'Login failed.';
        alertEl.className = 'alert error';
        btn.disabled = false;
        btn.textContent = '🔐 Sign In to Admin Panel';
      }
    });
  </script>
</body>
</html>
