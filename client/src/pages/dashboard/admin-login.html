<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD — Admin Login</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1f0f 0%, #1a3a22 50%, #0d2b18 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a6b3c, #2d6a4f);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(26,107,60,0.35);
    }

    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1f36;
      letter-spacing: 1px;
    }

    .logo-area p {
      color: #6c757d;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #344054;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 10px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #1a1f36;
    }

    .form-group input:focus {
      border-color: #1a6b3c;
      box-shadow: 0 0 0 3px rgba(26,107,60,0.12);
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a6b3c, #2d6a4f);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .alert-box {
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
    }

    .alert-box.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
    .alert-box.success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; display: block; }

    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.82rem;
      color: #6c757d;
    }

    .back-link a {
      color: #1a6b3c;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link a:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: #f0f2f5;
      margin: 24px 0;
    }

    .security-note {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #8b9bb4;
      text-align: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">🛡️</div>
      <h1>GUYGD Admin</h1>
      <p>Sign in to access the admin panel</p>
    </div>

    <div class="alert-box" id="login-alert"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="admin@guygd.org" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="submit-btn" id="login-btn">🔐 Sign In to Admin Panel</button>
    </form>

    <div class="divider"></div>
    <div class="security-note">🔒 Restricted access — authorized personnel only</div>

    <div class="back-link">
      <a href="/index.html">← Back to main site</a>
    </div>
  </div>

  <script>
    const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';

    // If already logged in as admin, go straight to dashboard
    (function() {
      try {
        const u = JSON.parse(localStorage.getItem('guygd_user') || 'null');
        const t = localStorage.getItem('guygd_token');
        if (u && t && ['admin','executive','super_admin'].includes(u.role)) {
          window.location.href = '/dashboard/admin.html';
        }
      } catch(e) {}
    })();

    function showAlert(msg, type) {
      const el = document.getElementById('login-alert');
      el.textContent = msg;
      el.className = 'alert-box ' + type;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Signing in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        if (!['admin','executive','super_admin'].includes(data.user.role)) {
          throw new Error('Access denied. Admin accounts only.');
        }

        localStorage.setItem('guygd_token', data.token);
        localStorage.setItem('guygd_user', JSON.stringify(data.user));
        showAlert('✅ Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = '/dashboard/admin.html'; }, 1000);
      } catch(err) {
        showAlert(err.message || 'Login failed. Check your credentials.', 'error');
        btn.disabled = false;
        btn.textContent = '🔐 Sign In to Admin Panel';
      }
    });
  </script>
</body>
</html>
