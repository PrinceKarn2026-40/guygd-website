<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GUYGD – Membership</title>
  <link rel="stylesheet" href="/src/css/main.css"/>
  <link rel="stylesheet" href="/src/css/responsive.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/index.html" class="nav-logo">GUYGD</a>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Join GUYGD</h1>
    <p>Become part of a movement that is transforming lives in Gbeh-lay.</p>
  </div>

  <section class="section">
    <div class="container">
      <!-- Tabs -->
      <div style="display:flex;justify-content:center;gap:10px;margin-bottom:35px;">
        <button class="btn btn-primary" id="tab-register" onclick="showTab('register')">Register</button>
        <button class="btn btn-green" id="tab-login" onclick="showTab('login')">Login</button>
      </div>

      <!-- Register Form -->
      <div id="register-section" class="form-container">
        <h3 style="margin-bottom:20px;color:var(--green);text-align:center;">Create Your Account</h3>
        <div class="alert" id="register-alert"></div>
        <form id="register-form">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="reg-name" placeholder="Your full name" required/>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="reg-email" placeholder="your@email.com" required/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="reg-phone" placeholder="+231 xxx xxx xxx"/>
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select id="reg-gender">
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Date of Birth</label>
              <input type="date" id="reg-dob"/>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="reg-address" placeholder="Your address"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="reg-password" placeholder="Min 6 characters" required/>
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input type="password" id="reg-confirm" placeholder="Repeat password" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Create Account</button>
          <p style="text-align:center;margin-top:15px;font-size:0.9rem;color:var(--gray);">
            Already have an account? <a href="#" onclick="showTab('login')" style="color:var(--green);">Login here</a>
          </p>
        </form>
      </div>

      <!-- Login Form -->
      <div id="login-section" class="form-container" style="display:none;">
        <h3 style="margin-bottom:20px;color:var(--green);text-align:center;">Welcome Back</h3>
        <div class="alert" id="login-alert"></div>
        <form id="login-form">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="login-email" placeholder="your@email.com" required/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Your password" required/>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Login</button>
          <p style="text-align:center;margin-top:15px;font-size:0.9rem;color:var(--gray);">
            Don't have an account? <a href="#" onclick="showTab('register')" style="color:var(--green);">Register here</a>
          </p>
        </form>
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <script src="/src/js/main.js"></script>
  <script>
    function showTab(tab) {
      document.getElementById('register-section').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('login-section').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('tab-register').className = tab === 'register' ? 'btn btn-primary' : 'btn btn-green';
      document.getElementById('tab-login').className = tab === 'login' ? 'btn btn-primary' : 'btn btn-green';
    }

    // Check URL param
    document.addEventListener('DOMContentLoaded', () => {
      if (window.location.search.includes('login')) showTab('login');
      if (getUser()) {
        const user = getUser();
        window.location.href = user.role === 'admin' || user.role === 'executive'
          ? '/dashboard/admin.html' : '/dashboard/member.html';
      }
    });

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      if (password !== confirm) { showAlert('register-alert', 'Passwords do not match.', 'error'); return; }
      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            full_name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('reg-phone').value,
            gender: document.getElementById('reg-gender').value,
            date_of_birth: document.getElementById('reg-dob').value,
            address: document.getElementById('reg-address').value,
            password,
          }),
        });
        localStorage.setItem('guygd_token', data.token);
        localStorage.setItem('guygd_user', JSON.stringify(data.user));
        showAlert('register-alert', 'Account created! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' || data.user.role === 'executive'
            ? '/dashboard/admin.html' : '/dashboard/member.html';
        }, 1500);
      } catch (err) { showAlert('register-alert', err.message, 'error'); }
    });

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('login-email').value,
            password: document.getElementById('login-password').value,
          }),
        });
        localStorage.setItem('guygd_token', data.token);
        localStorage.setItem('guygd_user', JSON.stringify(data.user));
        showAlert('login-alert', 'Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' || data.user.role === 'executive'
            ? '/dashboard/admin.html' : '/dashboard/member.html';
        }, 1500);
      } catch (err) { showAlert('login-alert', err.message, 'error'); }
    });
  </script>
</body>
</html>
